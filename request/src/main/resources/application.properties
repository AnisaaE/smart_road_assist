spring.application.name=request
server.port=${SERVER_PORT:8082}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/smart_road_assist_request}
spring.data.mongodb.auto-index-creation=true
dispatcher.enforce-internal-header=${DISPATCHER_ENFORCE_INTERNAL_HEADER:true}
dispatcher.internal-header-name=${DISPATCHER_INTERNAL_HEADER_NAME:X-Dispatcher-Secret}
dispatcher.shared-secret=${DISPATCHER_SHARED_SECRET:smart-road-assist-internal-secret}
services.user.base-url=${USER_SERVICE_BASE_URL:http://localhost:8083}
