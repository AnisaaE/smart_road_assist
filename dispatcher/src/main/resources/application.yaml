spring:
  application:
    name: dispatcher
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/dispatcher_db}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

dispatcher:
  user-service-url: ${DISPATCHER_USER_SERVICE_URL:http://localhost:8083}
  request-service-url: ${DISPATCHER_REQUEST_SERVICE_URL:http://localhost:8082}
  mechanic-service-url: ${DISPATCHER_MECHANIC_SERVICE_URL:http://localhost:8081}
  payment-service-url: ${DISPATCHER_PAYMENT_SERVICE_URL:http://localhost:8084}
  notification-service-url: ${DISPATCHER_NOTIFICATION_SERVICE_URL:http://localhost:8085}
  auth-enabled: ${DISPATCHER_AUTH_ENABLED:true}
  api-key-header-name: ${DISPATCHER_API_KEY_HEADER_NAME:X-Api-Key}
  internal-header-name: ${DISPATCHER_INTERNAL_HEADER_NAME:X-Dispatcher-Secret}
  internal-shared-secret: ${DISPATCHER_INTERNAL_SHARED_SECRET:smart-road-assist-internal-secret}
  jwt-secret: ${DISPATCHER_JWT_SECRET:smart-road-assist-jwt-secret-1234567890}
