spring.application.name=mechanic
server.port=${SERVER_PORT:8081}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/mechanic}
spring.data.mongodb.auto-index-creation=true
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
dispatcher.enforce-internal-header=${DISPATCHER_ENFORCE_INTERNAL_HEADER:true}
dispatcher.internal-header-name=${DISPATCHER_INTERNAL_HEADER_NAME:X-Dispatcher-Secret}
dispatcher.shared-secret=${DISPATCHER_SHARED_SECRET:smart-road-assist-internal-secret}
